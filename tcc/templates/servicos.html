<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>BLK - Serviços</title>

    <link rel="stylesheet" href="{{url_for('static', filename='css/servicos.css')}}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<div id="app">

    <header class="topbar">

        <div class="logo">
            BLK
        </div>

        <nav>
            <a href="{{url_for('agenda') }}">Agenda</a>
            <a href="{{url_for('clientes') }}">Clientes</a>
            <a href="#">Atendimentos</a>
            <a class="active" href="#">Serviços</a>
        </nav>

    </header>

    <section class="page-header">

        <h1>Serviços</h1>

        <button
            id="btnNovoServico"
            class="new-btn">

            Novo Serviço
            <span>+</span>

        </button>

    </section>

    <main class="page-content">

        <div class="search-container">

            <div class="search-box">

                <input
                    id="searchInput"
                    type="text"
                    placeholder="Pesquisar Serviços">

                <button>
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>

            </div>

        </div>

        <div class="table-wrapper">

            <table>

                <thead>

                <tr>
                    <th>Nome</th>
                    <th>Valor Base</th>
                    <th>Descrição</th>
                    <th>Ações</th>
                </tr>

                </thead>

                <tbody id="servicosTableBody">

                </tbody>

            </table>

        </div>

    </main>

</div>

<!-- MODAL CADASTRO -->

<div
    id="createModal"
    class="modal-overlay">

    <div class="modal">

        <button
            class="close-btn"
            onclick="closeCreateModal()">

            &times;

        </button>

        <h2>CADASTRAR SERVIÇO</h2>

        <form id="createForm">

            <input
                id="createNome"
                type="text"
                placeholder="Nome*"
                required>

            <input
                id="createValor"
                type="number"
                step="0.01"
                min="0"
                placeholder="Valor Base*"
                required>

            <textarea
                id="createDescricao"
                placeholder="Descrição"></textarea>

            <button
                type="submit"
                class="submit-btn">

                Cadastrar

            </button>

        </form>

    </div>

</div>

<!-- MODAL EDIÇÃO -->

<div
    id="editModal"
    class="modal-overlay">

    <div class="modal">

        <button
            class="close-btn"
            onclick="closeEditModal()">

            &times;

        </button>

        <h2>EDITAR SERVIÇO</h2>

        <form id="editForm">

            <input
                id="editId"
                type="hidden">

            <input
                id="editNome"
                type="text"
                required>

            <input
                id="editValor"
                type="number"
                step="0.01"
                min="0"
                required>

            <textarea
                id="editDescricao"></textarea>

            <button
                type="submit"
                class="submit-btn">

                Salvar

            </button>

        </form>

    </div>

</div>

<script src="{{url_for('static', filename='js/servicos.js')}}"></script>

</body>
</html>
