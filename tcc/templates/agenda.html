<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLK - Agenda</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/agenda.css')}}">
</head>
<body>

    <div id="app">

        <!-- HEADER -->

        <header class="topbar">

            <div class="logo">
                BLK
            </div>

            <nav>
                <a href="#" class="active">Agenda</a>
                <a href="{{url_for('clientes') }}">Clientes</a>
                <a href="#">Atendimentos</a>
                <a href="{{url_for('servicos') }}">Serviços</a>
            </nav>

        </header>

        <!-- SUB HEADER -->

        <section class="agenda-header">

            <div class="left-info">

                <h1 style="font-family: luciole;">Agenda</h1>  

                <div class="legend">
                    <strong>Legenda:</strong>

                    <div class="legend-item">
                        <span class="event-circle"></span>
                        Atendimento
                    </div>
                </div>

            </div>

            <button id="openReminderModal" class="create-btn">
                Criar Lembrete
                <span>+</span>
            </button>

        </section>

        <!-- CONTEÚDO -->

        <main class="content">

            <!-- LEMBRETES -->

            <aside class="reminders-panel">

                <h2>Lembretes</h2>

                <div id="remindersList" class="reminders-list">

                    <!--
                    Flask irá renderizar os lembretes aqui.

                    Exemplo:
                    {% for reminder in reminders %}
                    ...
                    {% endfor %}
                    -->

                    <div class="reminder-item">

                        <div class="day-circle">
                            1
                        </div>

                        <div class="reminder-card">
                            <h3>Lorem Ipsum</h3>
                            <p>
                                Descrição do lembrete.
                            </p>
                        </div>

                    </div>

                </div>

            </aside>

            <!-- CALENDÁRIO -->

            <section class="calendar-panel">

                <!--
                Futuramente substituir por Embed do Google Agenda.

                Exemplo:

                <iframe src="{{ google_calendar_url }}"></iframe>
                -->

                <div class="calendar-placeholder">

                    <iframe src="https://calendar.google.com/calendar/embed?height=600&wkst=1&ctz=America%2FRecife&showTitle=0&src=d2FzaGluZ3RvbnZpdG9yMzBAZ21haWwuY29t&src=cHQtYnIuYnJhemlsaWFuI2hvbGlkYXlAZ3JvdXAudi5jYWxlbmRhci5nb29nbGUuY29t&src=Y2xhc3Nyb29tMTAxMDM3NTQ4MjE4Njc3NDgxMzU4QGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&src=Y2xhc3Nyb29tMTAxNjE2ODE3NDY5NjY2NDYxOTU5QGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&src=Y2xhc3Nyb29tMTAxOTg0MzIwMzMwMDQ4MzI4ODQ5QGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&src=Y2xhc3Nyb29tMTAyNjkzNTY2NzU2NDMyMDk1NjgyQGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&src=Y2xhc3Nyb29tMTAzNjQ1NDI4NzE1MTYwNzAzODE1QGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&src=Y2xhc3Nyb29tMTA3Njc5MDg5ODAwNzczOTUzMjEyQGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&src=Y2xhc3Nyb29tMTE0NTA4MTI0MTMzNTYzNjQ2MTkyQGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&src=Y2xhc3Nyb29tMTE1MzY4MjM1NzgyMDE2MTM1OTQ3QGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&color=%23039be5&color=%230b8043&color=%231967d2&color=%23202124&color=%231967d2&color=%23202124&color=%23007b83&color=%23202124&color=%23202124&color=%23202124" style="border:solid 1px #777" width="100%" height="100%" frameborder="0" scrolling="no"></iframe>

                </div>

            </section>

        </main>

    </div>

    <!-- MODAL -->

    <div id="modalOverlay" class="modal-overlay">

        <div class="modal">

            <h2>CRIAR LEMBRETE</h2>

            <form id="reminderForm">

                <div class="input-group">

                    <input
                        type="date"
                        id="date"
                        name="date"
                        required
                    >

                </div>

                <div class="input-group">

                    <!--
                    Futuramente substituir por busca AJAX
                    no banco de dados.
                    -->

                    <input
                        type="text"
                        id="appointment"
                        placeholder="Atendimento"
                    >

                    <button type="button" class="icon-btn">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>

                </div>

                <div class="input-group">

                    <textarea
                        id="description"
                        placeholder="Descrição"
                    ></textarea>

                </div>

                <div class="modal-actions">

                    <button type="submit" class="save-btn">
                        Criar
                    </button>

                </div>

            </form>

        </div>

    </div>

    <script src="{{url_for('static', filename='js/agenda.js')}}"></script>

</body>
</html>
